spring.application.name=auth-service
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=fusion5user
spring.datasource.password=Fusion5@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# JWT
jwt.secret=Fusion5SkillAsAServiceSuperSecretKeyForJWT2026MustBe256BitsLong
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=fusion5
spring.rabbitmq.password=Fusion5@2026

# RabbitMQ Queue Names
rabbitmq.queue.email=email.queue
rabbitmq.queue.notification=notification.queue
rabbitmq.exchange=skillasaservice.exchange
rabbitmq.routing.email=email.routing.key
rabbitmq.routing.notification=notification.routing.key

# Actuator
management.endpoints.web.exposure.include=*