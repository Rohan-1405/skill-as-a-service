spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Gateway Routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=profile-service
spring.cloud.gateway.routes[1].uri=lb://profile-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/profile/**

spring.cloud.gateway.routes[2].id=subscription-service
spring.cloud.gateway.routes[2].uri=lb://subscription-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/subscriptions/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**

spring.cloud.gateway.routes[4].id=wallet-service
spring.cloud.gateway.routes[4].uri=lb://wallet-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/wallet/**

spring.cloud.gateway.routes[5].id=project-service
spring.cloud.gateway.routes[5].uri=lb://project-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.routes[6].id=chat-service
spring.cloud.gateway.routes[6].uri=lb://chat-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/chat/**

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/notifications/**

# Actuator
management.endpoints.web.exposure.include=*